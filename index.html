<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pad Rivals — Mzansi Street Racing</title>
    <meta name="description" content="Pad Rivals – A South African top-down street racing game. Dodge potholes, pass rivals, and own the Mzansi streets!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #050510;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none; user-select: none;
        }
        #wrap {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow:
                0 0 80px rgba(255,184,28,0.18),
                0 0 200px rgba(0,119,73,0.10);
        }
        canvas { display: block; }
    </style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
(() => {
    'use strict';

    /* =========================================================
       CONSTANTS
    ========================================================= */
    const W = 480, H = 820;
    const ROAD_W = 300;
    const ROAD_L = (W - ROAD_W) / 2;          // 90
    const ROAD_R = ROAD_L + ROAD_W;            // 390
    const LANES = 3;
    const LANE_W = ROAD_W / LANES;             // 100
    const LANE_X = Array.from({length: LANES}, (_, i) => ROAD_L + LANE_W * (i + 0.5));
    const CAR_W = 46, CAR_H = 78;
    const POT_MAX_R = 18;

    /* SA palette */
    const SA = { green:'#007A4D', gold:'#FFB81C', red:'#DE3831', blue:'#002395', black:'#000', white:'#FFF' };

    /* Car roster */
    const CARS = [
        { name:'GUSHESHE',  desc:'325is — Speed demon',  body:'#b22222', roof:'#8b1a1a', accent:'#e74c3c', spd:1.20, grip:0.90 },
        { name:'CITI GOLF', desc:'VW Street legend',      body:'#1a6daa', roof:'#14537f', accent:'#3498db', spd:1.00, grip:1.10 },
        { name:'HILUX',     desc:'Tough bakkie',           body:'#6b7b8d', roof:'#576778', accent:'#95a5a6', spd:0.85, grip:1.05 },
        { name:'QUANTUM',   desc:'Taxi king!',             body:'#d4a800', roof:'#b08f00', accent:'#f1c40f', spd:1.10, grip:0.80 },
    ];

    const OVERTAKE_MSGS = ['SHARP!','LEKKER!','SHAP SHAP!','HEITA!','EAZY!','GRAND!','NICE ONE!'];

    /* =========================================================
       CANVAS SETUP
    ========================================================= */
    const cvs = document.getElementById('c');
    const ctx = cvs.getContext('2d');
    cvs.width = W; cvs.height = H;

    function resize() {
        const s = Math.min(innerWidth * 0.96 / W, innerHeight * 0.96 / H, 1.4);
        cvs.style.width  = (W * s) + 'px';
        cvs.style.height = (H * s) + 'px';
    }
    resize(); addEventListener('resize', resize);

    /* =========================================================
       AUDIO  (tiny Web Audio beeps)
    ========================================================= */
    let actx;
    const initAudio = () => { if (!actx) actx = new (AudioContext || webkitAudioContext)(); };
    function beep(f, dur, type='square', vol=0.08) {
        if (!actx) return;
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = type; o.frequency.value = f;
        g.gain.value = vol;
        g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(); o.stop(actx.currentTime + dur);
    }
    const sfx = {
        select:  () => beep(600, 0.08, 'sine', 0.07),
        start:   () => { beep(440,0.1,'sine',0.06); setTimeout(()=>beep(660,0.1,'sine',0.06),100); setTimeout(()=>beep(880,0.15,'sine',0.08),200); },
        pass:    () => { beep(880,0.12,'sine',0.07); setTimeout(()=>beep(1100,0.08,'sine',0.07),80); },
        crash:   () => { beep(90,0.35,'sawtooth',0.14); beep(70,0.4,'square',0.08); },
    };

    /* =========================================================
       HELPERS
    ========================================================= */
    const lerp  = (a,b,t) => a + (b-a)*t;
    const rand  = (lo,hi) => Math.random()*(hi-lo)+lo;
    const randI = (lo,hi) => Math.floor(rand(lo, hi+1));
    const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
    function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }

    /* =========================================================
       PARTICLE  & FLOATING-TEXT SYSTEMS
    ========================================================= */
    let particles = [], floats = [];

    class Particle {
        constructor(x,y,vx,vy,sz,col,life){ Object.assign(this,{x,y,vx,vy,sz,col,life,max:life}); }
        tick(dt){ this.x+=this.vx*dt; this.y+=this.vy*dt; this.vy+=40*dt; this.life-=dt; }
        draw(){
            const a = Math.max(0,this.life/this.max);
            ctx.globalAlpha = a; ctx.fillStyle = this.col;
            ctx.beginPath(); ctx.arc(this.x,this.y,this.sz*a,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    function spawnExhaust(x,y){
        for(let i=0;i<2;i++) particles.push(new Particle(x+rand(-4,4),y,rand(-12,12),rand(30,70),rand(3,5),'#777',rand(0.25,0.5)));
    }
    function spawnSparks(x,y){
        for(let i=0;i<14;i++) particles.push(new Particle(x,y,rand(-120,120),rand(-120,120),rand(2,4),i%2?SA.gold:SA.red,rand(0.3,0.7)));
    }
    function addFloat(x,y,txt,col){
        floats.push({x,y,txt,col,life:1.2});
    }

    /* =========================================================
       DRAWING — TOP-DOWN CAR
    ========================================================= */
    function drawCar(x,y,w,h,def,hero=false){
        ctx.save(); ctx.translate(x,y);

        // shadow
        ctx.fillStyle='rgba(0,0,0,0.22)';
        rr(-w/2+4, -h/2+4, w, h, 9); ctx.fill();

        // wheels
        ctx.fillStyle='#111';
        const ww=8, wh=20, wr=3;
        rr(-w/2-2, -h/2+10, ww,wh,wr); ctx.fill();
        rr( w/2-6, -h/2+10, ww,wh,wr); ctx.fill();
        rr(-w/2-2,  h/2-30, ww,wh,wr); ctx.fill();
        rr( w/2-6,  h/2-30, ww,wh,wr); ctx.fill();

        // body
        ctx.fillStyle=def.body; rr(-w/2,-h/2,w,h,9); ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
        rr(-w/2,-h/2,w,h,9); ctx.stroke();

        // roof
        ctx.fillStyle=def.roof; rr(-w/2+5,-h/2+18,w-10,h-36,5); ctx.fill();

        // windshield
        ctx.fillStyle='rgba(130,200,255,0.40)';
        rr(-w/2+6,-h/2+12,w-12,18,4); ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=0.5;
        rr(-w/2+6,-h/2+12,w-12,18,4); ctx.stroke();

        // rear window
        ctx.fillStyle='rgba(130,200,255,0.30)';
        rr(-w/2+8,h/2-27,w-16,14,3); ctx.fill();

        // headlights
        ctx.fillStyle= hero ? '#ffffc0':'#ffee88';
        ctx.shadowColor='#ffffaa'; ctx.shadowBlur= hero?14:6;
        ctx.beginPath(); ctx.ellipse(-w/2+9,-h/2+4,5,3,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( w/2-9,-h/2+4,5,3,0,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;

        // taillights
        ctx.fillStyle='#ff2222'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=hero?10:4;
        ctx.beginPath(); ctx.ellipse(-w/2+9,h/2-4,5,3,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( w/2-9,h/2-4,5,3,0,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;

        // hero stripe
        if(hero){ ctx.fillStyle=def.accent; ctx.globalAlpha=0.35;
            rr(-w/2+3,-h/2+36,w-6,3,1); ctx.fill();
            rr(-w/2+3, h/2-38,w-6,3,1); ctx.fill();
            ctx.globalAlpha=1;
        }
        ctx.restore();
    }

    /* headlight beam (subtle glow) */
    function drawBeam(px,py){
        const g = ctx.createRadialGradient(px,py-CAR_H/2,4, px,py-CAR_H/2-100,70);
        g.addColorStop(0,'rgba(255,255,210,0.08)');
        g.addColorStop(1,'rgba(255,255,210,0)');
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.moveTo(px-28, py-CAR_H/2);
        ctx.lineTo(px-55, py-CAR_H/2-130);
        ctx.lineTo(px+55, py-CAR_H/2-130);
        ctx.lineTo(px+28, py-CAR_H/2);
        ctx.fill();
    }

    /* =========================================================
       DRAWING — POTHOLE
    ========================================================= */
    function drawPothole(x,y,r){
        ctx.fillStyle='#181818'; ctx.beginPath(); ctx.arc(x,y,r+3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#0c0c0c'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1.4;
        ctx.beginPath(); ctx.arc(x,y,r+2,-0.8,1.2); ctx.stroke();
        ctx.strokeStyle='#222'; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(x-r*0.4,y-r*0.3); ctx.lineTo(x+r*0.3,y+r*0.2);
        ctx.moveTo(x+r*0.1,y-r*0.45); ctx.lineTo(x-r*0.2,y+r*0.35); ctx.stroke();
    }

    /* =========================================================
       DRAWING — ROAD & SCENERY
    ========================================================= */
    let roadOff = 0;

    function drawRoad(){
        // veld
        ctx.fillStyle='#265a22'; ctx.fillRect(0,0,W,H);

        // gravel shoulder
        ctx.fillStyle='#50473a'; ctx.fillRect(ROAD_L-14,0,ROAD_W+28,H);

        // tarmac
        ctx.fillStyle='#2e2e2e'; ctx.fillRect(ROAD_L,0,ROAD_W,H);

        // lane dashes
        ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
        ctx.setLineDash([28,24]); ctx.lineDashOffset=-roadOff;
        for(let i=1;i<LANES;i++){
            const lx=ROAD_L+LANE_W*i;
            ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
        }
        ctx.setLineDash([]);

        // edge lines
        ctx.strokeStyle=SA.gold; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(ROAD_L,0); ctx.lineTo(ROAD_L,H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ROAD_R,0); ctx.lineTo(ROAD_R,H); ctx.stroke();

        // road posts
        const ps=130;
        for(let y=(roadOff%ps)-ps; y<H+ps; y+=ps){
            ctx.fillStyle='#ccc'; ctx.fillRect(ROAD_L-9,y,4,12);
            ctx.fillStyle=SA.red;  ctx.fillRect(ROAD_L-9,y,4,4);
            ctx.fillStyle='#ccc'; ctx.fillRect(ROAD_R+5,y,4,12);
            ctx.fillStyle=SA.red;  ctx.fillRect(ROAD_R+5,y,4,4);
        }
    }

    function drawTree(x,y){
        ctx.fillStyle='#3a2810'; ctx.fillRect(x-3,y-4,6,11);
        ctx.fillStyle='#176b17'; ctx.beginPath(); ctx.arc(x,y-8,13,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#228b22'; ctx.beginPath(); ctx.arc(x-3,y-10,7,0,Math.PI*2); ctx.fill();
    }
    function drawScenery(){
        const ts=160;
        for(let y=(roadOff%ts)-ts; y<H+ts; y+=ts){
            drawTree(30+Math.sin(y*0.012)*12, y);
            drawTree(W-30+Math.cos(y*0.012)*12, y+70);
        }
    }

    /* =========================================================
       HUD
    ========================================================= */
    function drawHUD(){
        ctx.fillStyle='rgba(0,0,0,0.72)';
        rr(10,10,W-20,55,10); ctx.fill();
        ctx.strokeStyle='rgba(255,184,28,0.25)'; ctx.lineWidth=1;
        rr(10,10,W-20,55,10); ctx.stroke();

        const cols = [
            {lbl:'SCORE',   val:score.toLocaleString(), x:25},
            {lbl:'DISTANCE',val:Math.floor(dist)+'m',   x:145},
            {lbl:'SPEED',   val:Math.floor(scrollSpd*0.8)+' km/h', x:275},
        ];
        cols.forEach(c=>{
            ctx.textAlign='left';
            ctx.fillStyle=SA.gold; ctx.font='600 13px Outfit'; ctx.fillText(c.lbl,c.x,31);
            ctx.fillStyle='#fff';  ctx.font='800 17px Outfit'; ctx.fillText(c.val,c.x,52);
        });

        // lives (hearts)
        ctx.fillStyle=SA.gold; ctx.font='600 13px Outfit'; ctx.textAlign='left';
        ctx.fillText('LIVES',398,31);
        for(let i=0;i<lives;i++){
            const hx=404+i*20, hy=48;
            ctx.fillStyle=SA.red;
            ctx.beginPath();
            ctx.moveTo(hx,hy-2);
            ctx.bezierCurveTo(hx-6,hy-9, hx-12,hy-1, hx,hy+7);
            ctx.bezierCurveTo(hx+12,hy-1, hx+6,hy-9, hx,hy-2);
            ctx.fill();
        }
    }

    /* =========================================================
       GAME STATE
    ========================================================= */
    let state = 'MENU';          // MENU | PLAY | OVER
    let selCar = 0;
    let player, rivals, potholes;
    let scrollSpd, dist, score, overtakes, lives;
    let gTime, spawnT, potT, difficulty;
    let shake = 0;
    let highScore = parseInt(localStorage.getItem('padRivalsHS'))||0;
    let menuParts = [];
    let lastT = null;

    function startGame(){
        const c = CARS[selCar];
        player = { x:LANE_X[1], y:H-160, lane:1, tx:LANE_X[1], car:c, inv:0 };
        rivals=[]; potholes=[]; particles=[]; floats=[];
        roadOff=0; scrollSpd=160; dist=0; score=0; overtakes=0;
        gTime=0; spawnT=0; potT=0; difficulty=1; shake=0; lives=3;
        state='PLAY'; sfx.start();
    }

    /* =========================================================
       UPDATE
    ========================================================= */
    function update(dt){
        if(state!=='PLAY') return;
        gTime += dt;
        difficulty = 1 + gTime*0.018;
        scrollSpd = clamp((160 + gTime*3.2)*CARS[selCar].spd, 160, 620);
        roadOff = (roadOff + scrollSpd*dt) % 52;
        dist += scrollSpd*dt*0.05;

        // smooth lane movement
        const ms = 420 * CARS[selCar].grip;
        if(Math.abs(player.x - player.tx)>1){
            player.x += Math.sign(player.tx - player.x)*ms*dt;
            if(Math.abs(player.x - player.tx)<2) player.x = player.tx;
        }

        // vertical nudge
        if(keys.up)   player.y = Math.max(90, player.y - 160*dt);
        if(keys.down)  player.y = Math.min(H-90, player.y + 160*dt);
        player.y = lerp(player.y, H-160, dt*0.6);

        // invulnerability
        if(player.inv>0) player.inv-=dt;

        // exhaust
        if(Math.random()<dt*30) spawnExhaust(player.x, player.y+CAR_H/2);

        /* — Spawn rivals — */
        spawnT -= dt;
        if(spawnT<=0){
            const ln = randI(0,2);
            const rivalColors = [
                {body:'#c0392b',roof:'#9b2c2c',accent:'#e74'},
                {body:'#2471a3',roof:'#1a5276',accent:'#5af'},
                {body:'#707b7c',roof:'#555',accent:'#999'},
                {body:'#8e44ad',roof:'#6c3483',accent:'#bb6'},
                {body:'#ffffff',roof:'#ccc',accent:'#ddd'},
                {body:'#d4ac0d',roof:'#b7950b',accent:'#fe5'},
            ];
            rivals.push({
                x: LANE_X[ln], y: -CAR_H-20, lane:ln,
                spd: scrollSpd * rand(0.28,0.55),
                car: rivalColors[randI(0,rivalColors.length-1)],
                passed: false,
                swerve: Math.random()<0.12*difficulty,
                swerveT: rand(1.2,3),
            });
            spawnT = Math.max(0.38, rand(0.7,1.8)/difficulty);
        }

        /* — Update rivals — */
        for(let i=rivals.length-1;i>=0;i--){
            const r=rivals[i];
            r.y += (scrollSpd - r.spd)*dt;
            // swerving
            if(r.swerve){ r.swerveT-=dt;
                if(r.swerveT<=0){ const nl=r.lane+(Math.random()>0.5?1:-1);
                    if(nl>=0&&nl<=2) r.lane=nl; r.swerveT=rand(1.5,3); }
                r.x = lerp(r.x, LANE_X[r.lane], dt*3.5);
            }
            // overtake
            if(!r.passed && r.y > player.y+CAR_H*0.6){
                r.passed=true; overtakes++;
                sfx.pass();
                const msg = OVERTAKE_MSGS[randI(0,OVERTAKE_MSGS.length-1)];
                addFloat(player.x, player.y-CAR_H/2-10, '+100 '+msg, SA.gold);
                spawnSparks(player.x, player.y-CAR_H/2);
            }
            if(r.y>H+120){ rivals.splice(i,1); continue; }
            // collision
            if(player.inv<=0 && Math.abs(r.x-player.x)<CAR_W*0.78 && Math.abs(r.y-player.y)<CAR_H*0.78)
                hit(r.x,r.y);
        }

        /* — Spawn potholes — */
        potT -= dt;
        if(potT<=0){
            const ln=randI(0,2);
            potholes.push({ x:LANE_X[ln]+rand(-12,12), y:-POT_MAX_R*2, r:rand(10,POT_MAX_R) });
            potT = Math.max(0.45, rand(1.2,3.5)/(difficulty*0.7));
        }

        /* — Update potholes — */
        for(let i=potholes.length-1;i>=0;i--){
            potholes[i].y += scrollSpd*dt;
            if(potholes[i].y>H+40){ potholes.splice(i,1); continue; }
            const p=potholes[i];
            if(player.inv<=0 && Math.abs(p.x-player.x)<(CAR_W/2+p.r*0.55) && Math.abs(p.y-player.y)<(CAR_H/2+p.r*0.55)){
                hit(p.x,p.y); potholes.splice(i,1);
            }
        }

        /* — Particles & floats — */
        for(let i=particles.length-1;i>=0;i--){ particles[i].tick(dt); if(particles[i].life<=0) particles.splice(i,1); }
        floats.forEach(f=>{ f.y-=65*dt; f.life-=dt; });
        floats = floats.filter(f=>f.life>0);

        score = Math.floor(dist)*10 + overtakes*100;
        if(shake>0){ shake*=0.88; if(shake<0.4) shake=0; }
    }

    function hit(cx,cy){
        lives--; sfx.crash(); spawnSparks(cx,cy); shake=16; player.inv=2;
        if(lives<=0){
            state='OVER';
            if(score>highScore){ highScore=score; localStorage.setItem('padRivalsHS',highScore); }
        }
    }

    /* =========================================================
       INPUT
    ========================================================= */
    const keys = { left:false, right:false, up:false, down:false };
    function mapKey(code){ return {ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',ArrowUp:'up',KeyW:'up',ArrowDown:'down',KeyS:'down'}[code]; }

    function changeLane(dir){
        const nl = player.lane+dir;
        if(nl>=0 && nl<LANES && Math.abs(player.x-player.tx)<8){
            player.lane=nl; player.tx=LANE_X[nl];
        }
    }

    addEventListener('keydown', e=>{
        const k=mapKey(e.code); if(k) keys[k]=true;
        initAudio();
        if(state==='MENU'){
            if(e.code==='ArrowLeft'||e.code==='KeyA'){ selCar=(selCar-1+CARS.length)%CARS.length; sfx.select(); }
            if(e.code==='ArrowRight'||e.code==='KeyD'){ selCar=(selCar+1)%CARS.length; sfx.select(); }
            if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); startGame(); }
        } else if(state==='PLAY'){
            if(!e.repeat){
                if(e.code==='ArrowLeft'||e.code==='KeyA') changeLane(-1);
                if(e.code==='ArrowRight'||e.code==='KeyD') changeLane(1);
            }
            if(e.code==='Space') e.preventDefault();
        } else if(state==='OVER'){
            if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); state='MENU'; }
        }
    });
    addEventListener('keyup', e=>{ const k=mapKey(e.code); if(k) keys[k]=false; });

    /* Touch */
    let touchX0=0;
    cvs.addEventListener('touchstart',e=>{
        e.preventDefault(); initAudio();
        touchX0 = e.touches[0].clientX;
        if(state==='MENU') startGame();
        else if(state==='OVER') state='MENU';
    },{passive:false});
    cvs.addEventListener('touchmove',e=>{
        e.preventDefault();
        if(state!=='PLAY') return;
        const dx = e.touches[0].clientX - touchX0;
        if(Math.abs(dx)>28){
            changeLane(dx>0?1:-1);
            touchX0 = e.touches[0].clientX;
        }
    },{passive:false});

    /* Mouse car selection */
    cvs.addEventListener('click',e=>{
        initAudio();
        if(state==='MENU'){
            const rect=cvs.getBoundingClientRect();
            const sx=W/rect.width, sy=H/rect.height;
            const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
            const gap=(W-80)/4;
            CARS.forEach((_,i)=>{
                const cx=40+gap*i+gap/2;
                if(mx>cx-48&&mx<cx+48&&my>300&&my<460){ selCar=i; sfx.select(); }
            });
        } else if(state==='OVER') state='MENU';
    });

    /* =========================================================
       RENDER — MENU
    ========================================================= */
    function renderMenu(){
        ctx.fillStyle='#080816'; ctx.fillRect(0,0,W,H);

        // bg particles
        if(menuParts.length<55) menuParts.push({x:rand(0,W),y:rand(0,H),vx:rand(-8,8),vy:rand(-18,-4),sz:rand(1,2.8),a:rand(0.08,0.35),col:[SA.gold,SA.green,SA.red][randI(0,2)]});
        menuParts.forEach(p=>{ p.x+=p.vx*0.016; p.y+=p.vy*0.016; if(p.y<-10){p.y=H+10;p.x=rand(0,W);}
            ctx.globalAlpha=p.a; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); });
        ctx.globalAlpha=1;

        // flag stripes
        const sh=5;
        ctx.fillStyle=SA.green; ctx.fillRect(0,0,W,sh);
        ctx.fillStyle=SA.gold;  ctx.fillRect(0,sh,W,sh);
        ctx.fillStyle=SA.red;   ctx.fillRect(0,sh*2,W,sh);

        // title
        ctx.textAlign='center';
        const tg = ctx.createLinearGradient(W/2-140,80,W/2+140,200);
        tg.addColorStop(0,SA.green); tg.addColorStop(0.4,SA.gold); tg.addColorStop(1,SA.red);

        ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.font='900 76px Outfit';
        ctx.fillText('PAD',W/2+3,128); ctx.fillText('RIVALS',W/2+3,198);
        ctx.fillStyle=tg; ctx.fillText('PAD',W/2,125); ctx.fillText('RIVALS',W/2,195);

        ctx.fillStyle='#999'; ctx.font='600 15px Outfit';
        ctx.fillText('MZANSI STREET RACING',W/2,225);

        // select label
        ctx.fillStyle=SA.gold; ctx.font='700 17px Outfit'; ctx.fillText('CHOOSE YOUR RIDE',W/2,285);

        // cars
        const gap=(W-80)/4;
        CARS.forEach((c,i)=>{
            const cx=40+gap*i+gap/2, cy=380;
            const sel = i===selCar;
            if(sel){
                ctx.fillStyle='rgba(255,184,28,0.12)'; rr(cx-46,cy-68,92,145,10); ctx.fill();
                ctx.strokeStyle=SA.gold; ctx.lineWidth=2; rr(cx-46,cy-68,92,145,10); ctx.stroke();
            }
            drawCar(cx,cy,34,58,c,sel);
            ctx.fillStyle=sel?SA.gold:'#666'; ctx.font=`${sel?'700':'600'} ${sel?13:11}px Outfit`;
            ctx.textAlign='center'; ctx.fillText(c.name,cx,cy+52);
            ctx.fillStyle=sel?'#bbb':'#444'; ctx.font='400 9px Outfit'; ctx.fillText(c.desc,cx,cy+66);
        });

        // stat bars
        const s=CARS[selCar], by=478;
        ctx.fillStyle='rgba(255,255,255,0.04)'; rr(W/2-140,by,280,60,8); ctx.fill();
        ctx.textAlign='left'; ctx.font='600 11px Outfit';
        ctx.fillStyle='#666'; ctx.fillText('SPEED',W/2-120,by+20);
        ctx.fillStyle='#2a2a2a'; rr(W/2-45,by+10,155,10,5); ctx.fill();
        ctx.fillStyle=SA.red; rr(W/2-45,by+10,155*(s.spd/1.3),10,5); ctx.fill();
        ctx.fillStyle='#666'; ctx.fillText('GRIP',W/2-120,by+46);
        ctx.fillStyle='#2a2a2a'; rr(W/2-45,by+36,155,10,5); ctx.fill();
        ctx.fillStyle=SA.green; rr(W/2-45,by+36,155*(s.grip/1.2),10,5); ctx.fill();

        // controls
        ctx.textAlign='center'; ctx.fillStyle='#444'; ctx.font='400 12px Outfit';
        ctx.fillText('← →  to select car',W/2,590);

        // start
        const fl=Math.sin(Date.now()*0.005)*0.3+0.7;
        ctx.globalAlpha=fl; ctx.fillStyle=SA.gold; ctx.font='700 22px Outfit';
        ctx.fillText('PRESS SPACE TO RACE',W/2,645); ctx.globalAlpha=1;
        ctx.fillStyle='#333'; ctx.font='400 11px Outfit'; ctx.fillText('or tap the screen',W/2,668);

        if(highScore) { ctx.fillStyle=SA.gold; ctx.font='600 14px Outfit'; ctx.fillText('HIGH SCORE: '+highScore.toLocaleString(),W/2,720); }

        ctx.fillStyle=SA.red;   ctx.fillRect(0,H-sh*3,W,sh);
        ctx.fillStyle=SA.gold;  ctx.fillRect(0,H-sh*2,W,sh);
        ctx.fillStyle=SA.green; ctx.fillRect(0,H-sh,W,sh);

        ctx.fillStyle='#2a2a2a'; ctx.font='400 10px Outfit';
        ctx.fillText('WASD / ARROWS to drive  ·  Dodge potholes & rivals!',W/2,H-28);
    }

    /* =========================================================
       RENDER — GAME-OVER OVERLAY
    ========================================================= */
    function renderOver(){
        ctx.fillStyle='rgba(5,5,16,0.72)'; ctx.fillRect(0,0,W,H);
        ctx.textAlign='center';

        ctx.fillStyle=SA.red; ctx.font='900 82px Outfit'; ctx.fillText('EISH!',W/2,210);
        ctx.fillStyle='#999'; ctx.font='600 17px Outfit'; ctx.fillText("Your ride is totalled, boet!",W/2,245);

        ctx.fillStyle='rgba(0,0,0,0.50)'; rr(W/2-155,270,310,210,12); ctx.fill();
        ctx.strokeStyle='rgba(255,184,28,0.18)'; ctx.lineWidth=1; rr(W/2-155,270,310,210,12); ctx.stroke();

        const rows=[
            ['FINAL SCORE',score.toLocaleString(),SA.gold],
            ['DISTANCE',Math.floor(dist)+'m','#fff'],
            ['RIVALS PASSED',''+overtakes,'#fff'],
            ['TOP SPEED',Math.floor(scrollSpd*0.8)+' km/h','#fff']
        ];
        rows.forEach((r,i)=>{
            const ry=312+i*42;
            ctx.textAlign='left'; ctx.fillStyle='#777'; ctx.font='600 12px Outfit'; ctx.fillText(r[0],W/2-125,ry);
            ctx.textAlign='right'; ctx.fillStyle=r[2]; ctx.font='800 18px Outfit'; ctx.fillText(r[1],W/2+125,ry);
        });

        if(score>=highScore&&score>0){
            const p=Math.sin(Date.now()*0.008)*0.2+0.8;
            ctx.globalAlpha=p; ctx.textAlign='center'; ctx.fillStyle=SA.gold; ctx.font='700 20px Outfit';
            ctx.fillText('🏆 NEW HIGH SCORE! 🏆',W/2,520); ctx.globalAlpha=1;
        }

        const fl=Math.sin(Date.now()*0.005)*0.3+0.7;
        ctx.globalAlpha=fl; ctx.fillStyle=SA.green; ctx.font='700 21px Outfit';
        ctx.textAlign='center'; ctx.fillText('PRESS SPACE TO RACE AGAIN',W/2,590); ctx.globalAlpha=1;
        ctx.fillStyle='#333'; ctx.font='400 11px Outfit'; ctx.fillText('or tap the screen',W/2,614);
    }

    /* =========================================================
       RENDER — MAIN
    ========================================================= */
    function render(){
        ctx.save();
        if(shake>0) ctx.translate(rand(-shake,shake),rand(-shake,shake));

        if(state==='MENU'){
            renderMenu();
        } else {
            drawRoad();
            drawScenery();

            potholes.forEach(p=>drawPothole(p.x,p.y,p.r));

            // rivals
            rivals.forEach(r=>drawCar(r.x,r.y,CAR_W,CAR_H,r.car));

            // player beam + car
            drawBeam(player.x, player.y);
            if(player.inv<=0 || Math.floor(player.inv*10)%2)
                drawCar(player.x, player.y, CAR_W, CAR_H, player.car, true);

            particles.forEach(p=>p.draw());

            // floating texts
            floats.forEach(f=>{
                ctx.globalAlpha=Math.max(0,f.life/1.2);
                ctx.fillStyle=f.col; ctx.font='700 16px Outfit'; ctx.textAlign='center';
                ctx.fillText(f.txt, f.x, f.y);
                ctx.globalAlpha=1;
            });

            drawHUD();
            if(state==='OVER') renderOver();
        }
        ctx.restore();
    }

    /* =========================================================
       LOOP
    ========================================================= */
    function loop(ts){
        if(!lastT) lastT=ts;
        let dt = (ts-lastT)/1000;
        lastT = ts;
        if(dt>0.1) dt=0.1;
        update(dt);
        render();
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
})();
</script>
</body>
</html>
